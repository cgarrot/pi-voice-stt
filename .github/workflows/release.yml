name: Release

# Publishes to the npm registry when a version tag (v*) is pushed.
# Requires a repository secret named NPM_TOKEN (an npm automation access token).
# Without it the publish step fails with an auth error — add the secret at
# Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
